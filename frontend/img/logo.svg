<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48">
  <defs>
    <linearGradient id="logoViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7a5a9e"/>
      <stop offset="100%" style="stop-color:#5c3d7a"/>
    </linearGradient>
    <linearGradient id="logoGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a853"/>
      <stop offset="100%" style="stop-color:#b8922e"/>
    </linearGradient>
  </defs>

  <!-- Иконка — щит с лапой -->
  <g transform="translate(4, 4)">
    <path d="M20 2 L36 8 L36 28 C36 36 28 42 20 46 C12 42 4 36 4 28 L4 8 Z"
          fill="url(#logoViolet)" stroke="url(#logoGold)" stroke-width="2"/>
    <g transform="translate(20, 24)">
      <ellipse cx="0" cy="6" rx="7" ry="5" fill="url(#logoGold)"/>
      <ellipse cx="-5" cy="0" rx="3.5" ry="4" fill="url(#logoGold)"/>
      <ellipse cx="-1.5" cy="-3" rx="3.5" ry="4.5" fill="url(#logoGold)"/>
      <ellipse cx="1.5" cy="-3" rx="3.5" ry="4.5" fill="url(#logoGold)"/>
      <ellipse cx="5" cy="0" rx="3.5" ry="4" fill="url(#logoGold)"/>
    </g>
    <g fill="#d4cde0" opacity="0.6">
      <polygon points="20,10 21,13 24,13 22,15 22.5,18 20,16 17.5,18 18,15 16,13 19,13"
               transform="translate(-12, -2) scale(0.4)"/>
      <polygon points="20,10 21,13 24,13 22,15 22.5,18 20,16 17.5,18 18,15 16,13 19,13"
               transform="translate(12, -2) scale(0.4)"/>
    </g>
  </g>

  <!-- Текст FANGUNION -->
  <text x="52" y="32" font-family="Georgia, 'Times New Roman', serif" font-size="22"
        font-weight="bold" fill="url(#logoGold)" letter-spacing="2">FANGUNION</text>

  <!-- Подпись -->
  <text x="52" y="44" font-family="Georgia, 'Times New Roman', serif" font-size="8"
        fill="#908898" letter-spacing="1.5">СОЮЗ КЛЫКОВ</text>
</svg>
