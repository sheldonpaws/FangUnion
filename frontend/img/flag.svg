<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="flagViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5c3d7a"/>
      <stop offset="100%" style="stop-color:#2a1a3a"/>
    </linearGradient>
    <linearGradient id="flagGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a853"/>
      <stop offset="100%" style="stop-color:#b8922e"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e0f0"/>
      <stop offset="50%" style="stop-color:#c0b8d0"/>
      <stop offset="100%" style="stop-color:#908898"/>
    </linearGradient>
  </defs>

  <!-- Полотнище — три вертикальные полосы -->
  <rect x="0" y="0" width="100" height="200" fill="url(#flagViolet)"/>
  <rect x="100" y="0" width="100" height="200" fill="url(#flagGold)"/>
  <rect x="200" y="0" width="100" height="200" fill="#1a1220"/>

  <!-- Скандинавский крест (серебристый, тонкий, сосмещением влево) -->
  <!-- Вертикальная перекладина — в середине фиолетовой полосы -->
  <rect x="47" y="0" width="6" height="200" fill="url(#silverGrad)" opacity="0.85"/>
  <!-- Горизонтальная перекладина — ближе к верху -->
  <rect x="0" y="40" width="300" height="6" fill="url(#silverGrad)" opacity="0.85"/>

</svg>
