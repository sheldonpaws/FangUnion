<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="flagViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5c3d7a"/>
      <stop offset="100%" style="stop-color:#2a1a3a"/>
    </linearGradient>
    <linearGradient id="flagGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a853"/>
      <stop offset="100%" style="stop-color:#b8922e"/>
    </linearGradient>
  </defs>

  <!-- Полотнище -->
  <rect width="300" height="200" fill="url(#flagViolet)"/>

  <!-- Тонкие диагональные полоски (текстура шерсти) -->
  <g opacity="0.06">
    <line x1="0" y1="0" x2="300" y2="200" stroke="#c8a8e8" stroke-width="1"/>
    <line x1="50" y1="0" x2="350" y2="200" stroke="#c8a8e8" stroke-width="1"/>
    <line x1="-50" y1="0" x2="250" y2="200" stroke="#c8a8e8" stroke-width="1"/>
    <line x1="0" y1="50" x2="300" y2="250" stroke="#c8a8e8" stroke-width="1"/>
    <line x1="0" y1="-50" x2="300" y2="150" stroke="#c8a8e8" stroke-width="1"/>
  </g>

  <!-- Золотая кайма -->
  <rect x="3" y="3" width="294" height="194" fill="none" stroke="url(#flagGold)" stroke-width="3" rx="2"/>

  <!-- Герб в центре (упрощённый) -->
  <g transform="translate(150, 95)">
    <!-- Щит -->
    <path d="M0,-35 L35,-22 L35,15 C35,35 15,50 0,58 C-15,50 -35,35 -35,15 L-35,-22 Z"
          fill="#2a1a3a" stroke="url(#flagGold)" stroke-width="2.5"/>

    <!-- Лапа на щите -->
    <g transform="translate(0, 12)">
      <ellipse cx="0" cy="12" rx="14" ry="11" fill="url(#flagGold)"/>
      <ellipse cx="-11" cy="0" rx="6" ry="8" fill="url(#flagGold)"/>
      <ellipse cx="-4" cy="-5" rx="6" ry="9" fill="url(#flagGold)"/>
      <ellipse cx="4" cy="-5" rx="6" ry="9" fill="url(#flagGold)"/>
      <ellipse cx="11" cy="0" rx="6" ry="8" fill="url(#flagGold)"/>
    </g>

    <!-- Звёзды -->
    <g fill="#d4cde0">
      <polygon points="0,-22 2,-16 8,-16 3,-12 5,-6 0,-10 -5,-6 -3,-12 -8,-16 -2,-16"
               transform="translate(-18, -28) scale(0.6)"/>
      <polygon points="0,-22 2,-16 8,-16 3,-12 5,-6 0,-10 -5,-6 -3,-12 -8,-16 -2,-16"
               transform="translate(18, -28) scale(0.6)"/>
    </g>
  </g>

  <!-- Надпись внизу -->
  <text x="150" y="180" text-anchor="middle" font-family="Georgia, serif" font-size="14"
        fill="url(#flagGold)" font-weight="bold" letter-spacing="4">СОЮЗ КЛЫКОВ</text>
</svg>
