<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль — FangUnion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">☭</span>
                <span class="logo-text">FangUnion</span>
            </div>
            <nav class="nav">
                <a href="index.html" class="nav-link">Лента</a>
                <a href="assets.html" class="nav-link">Асеты</a>
                <a href="profile.html" class="nav-link active">Профиль</a>
                <a href="#" class="nav-link" onclick="logout()">Выйти</a>
            </nav>
        </div>
    </header>

    <main class="main" style="grid-template-columns: 300px 1fr;">
        <div>
            <div class="card" style="text-align:center;">
                <div id="profile-avatar" style="
                    width: 100px; height: 100px;
                    border-radius: 50%;
                    background: linear-gradient(135deg, var(--red), var(--gold));
                    margin: 0 auto 12px;
                    display: flex; align-items: center; justify-content: center;
                    font-size: 48px;
                ">🐾</div>
                <h2 id="profile-name" style="color:var(--red-dark);"></h2>
                <p id="profile-species" style="color:var(--text-light); font-size:14px;"></p>
                <p id="profile-bio" style="margin-top:8px; font-size:14px;"></p>
            </div>
            <div class="card">
                <h3 class="card-title">📊 Статистика</h3>
                <div id="stats">
                    <!-- Статистика -->
                </div>
            </div>
        </div>

        <div>
            <div class="card">
                <h3 class="card-title">📜 Мои объявления</h3>
                <div id="user-posts">
                    <!-- Посты пользователя -->
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>☭ FangUnion — Союз Клыков © 2026 | Все хвосты защищены ☭</p>
    </footer>

    <script>
        const API = "http://localhost:8000/api";
        const userId = localStorage.getItem("user_id");

        if (!userId) {
            window.location.href = "login.html";
        }

        async function loadProfile() {
            try {
                const res = await fetch(`${API}/users/${userId}`);
                const user = await res.json();
                document.getElementById("profile-name").textContent = user.display_name || user.username;
                document.getElementById("profile-species").textContent = user.species ? `Вид: ${user.species}` : "";
                document.getElementById("profile-bio").textContent = user.bio || "";

                document.getElementById("stats").innerHTML = `
                    <p>📅 В Союзе с: ${new Date(user.created_at).toLocaleDateString("ru-RU")}</p>
                    <p>🏷️ Позывной: ${user.username}</p>
                `;
            } catch (e) {
                console.error("Ошибка загрузки профиля:", e);
            }
        }

        async function loadUserPosts() {
            try {
                const res = await fetch(`${API}/posts/`);
                const posts = await res.json();
                const myPosts = posts.filter(p => p.author_id === parseInt(userId));
                const container = document.getElementById("user-posts");

                if (myPosts.length === 0) {
                    container.innerHTML = "<p style='color:var(--text-light);'>Ты ещё ничего не написал.</p>";
                    return;
                }

                container.innerHTML = myPosts.map(p => `
                    <div class="post">
                        <div class="post-content">${escapeHtml(p.content)}</div>
                        <div class="post-date">${formatDate(p.created_at)}</div>
                    </div>
                `).join("");
            } catch (e) {
                console.error("Ошибка загрузки постов:", e);
            }
        }

        function logout() {
            localStorage.removeItem("user_id");
            window.location.href = "login.html";
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            return new Date(dateStr).toLocaleDateString("ru-RU", {
                day: "numeric", month: "long", year: "numeric",
                hour: "2-digit", minute: "2-digit",
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadProfile();
            loadUserPosts();
        });
    </script>
</body>
</html>
