<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль — FangUnion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="logo" onclick="location.href='index.html'">
                <span class="logo-icon">🐾</span>
                <span class="logo-text">FangUnion</span>
            </div>
            <nav class="nav">
                <a href="index.html" class="nav-link">Лента</a>
                <a href="assets.html" class="nav-link">Галерея</a>
                <a href="profile.html" class="nav-link active">Профиль</a>
                <a href="#" class="nav-link" onclick="logout()">Выйти</a>
            </nav>
        </div>
    </header>

    <main class="main" style="grid-template-columns: 300px 1fr;">
        <div>
            <div class="card" style="text-align:center;">
                <div id="profile-avatar" style="
                    width: 100px; height: 100px;
                    border-radius: 50%;
                    background: linear-gradient(135deg, var(--violet-mid), var(--violet-deep));
                    margin: 0 auto 14px;
                    display: flex; align-items: center; justify-content: center;
                    font-size: 48px;
                    border: 2px solid var(--violet-light);
                ">🐾</div>
                <h2 id="profile-name" style="color:var(--violet-pale);"></h2>
                <p id="profile-species" style="color:var(--text-muted); font-size:13px;"></p>
                <p id="profile-bio" style="margin-top:10px; font-size:14px;"></p>
            </div>
            <div class="card">
                <h3 class="card-title">📊 О члене стаи</h3>
                <div id="stats"></div>
            </div>
        </div>

        <div>
            <div class="card">
                <h3 class="card-title">📜 Мои объявления</h3>
                <div id="user-posts"></div>
            </div>
            <div class="card">
                <h3 class="card-title">🎨 Мои асеты</h3>
                <div id="user-assets"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>🐾 FangUnion © 2026 | Союз Клыков — пространство для фурри 🐾</p>
    </footer>

    <script>
        const API = "http://127.0.0.1:8000/api";
        const userId = localStorage.getItem("user_id");

        if (!userId) {
            window.location.href = "login.html";
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            return new Date(dateStr).toLocaleDateString("ru-RU", {
                day: "numeric", month: "long", year: "numeric",
                hour: "2-digit", minute: "2-digit",
            });
        }

        async function loadProfile() {
            try {
                const res = await fetch(`${API}/users/${userId}`);
                const user = await res.json();
                document.getElementById("profile-name").textContent = user.display_name || user.email;
                document.getElementById("profile-species").textContent = user.species ? `Вид: ${user.species}` : "";
                document.getElementById("profile-bio").textContent = user.bio || "Пока ничего о себе не написал.";
                document.getElementById("stats").innerHTML = `
                    <p>📅 В стае с: <strong>${new Date(user.created_at).toLocaleDateString("ru-RU")}</strong></p>
                    <p style="margin-top:4px;">📧 Email: <strong>${user.email}</strong></p>
                `;
            } catch (e) {
                console.error(e);
            }
        }

        async function loadUserPosts() {
            try {
                const res = await fetch(`${API}/posts/`);
                const posts = await res.json();
                const myPosts = posts.filter(p => p.author_id === parseInt(userId));
                const container = document.getElementById("user-posts");
                if (myPosts.length === 0) {
                    container.innerHTML = "<p style='color:var(--text-muted);'>Пока пусто.</p>";
                    return;
                }
                container.innerHTML = myPosts.map(p => `
                    <div style="padding:10px 0; border-bottom:1px solid var(--border-color);">
                        <div>${escapeHtml(p.content)}</div>
                        <div style="font-size:11px; color:var(--text-muted); margin-top:4px;">${formatDate(p.created_at)}</div>
                    </div>
                `).join("");
            } catch (e) {
                console.error(e);
            }
        }

        async function loadUserAssets() {
            try {
                const res = await fetch(`${API}/assets/`);
                const assets = await res.json();
                const myAssets = assets.filter(a => a.owner_id === parseInt(userId));
                const container = document.getElementById("user-assets");
                if (myAssets.length === 0) {
                    container.innerHTML = "<p style='color:var(--text-muted);'>Пока пусто.</p>";
                    return;
                }
                container.innerHTML = myAssets.map(a => `
                    <div style="padding:10px 0; border-bottom:1px solid var(--border-color);">
                        <strong>${escapeHtml(a.title)}</strong>
                        <span class="species-tag" style="margin-left:6px;">${a.asset_type || 'прочее'}</span>
                    </div>
                `).join("");
            } catch (e) {
                console.error(e);
            }
        }

        function logout() {
            localStorage.removeItem("user_id");
            window.location.href = "login.html";
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadProfile();
            loadUserPosts();
            loadUserAssets();
        });
    </script>
</body>
</html>
