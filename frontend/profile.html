<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль — FangUnion</title>
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="logo" onclick="location.href='profile.html'">
                <img src="img/logo.svg" alt="FangUnion" style="height:36px;">
            </div>
            <nav class="nav">
                <a href="assets.html" class="nav-link">Галерея</a>
                <a href="constitution.html" class="nav-link">Конституция</a>
                <a href="symbols.html" class="nav-link">Символика</a>
                <a href="profile.html" class="nav-link active">Профиль</a>
                <a href="settings.html" class="nav-link">Настройки</a>
                <a href="#" class="nav-link" onclick="logout()">Выйти</a>
            </nav>
        </div>
    </header>

    <main class="main" style="grid-template-columns: 300px 1fr;">
        <div>
            <div class="card" style="text-align:center;">
                <div id="profile-avatar-wrap" style="position:relative; width:200px; height:200px; margin:0 auto 14px; border-radius:10px; overflow:hidden; border: 2px solid var(--violet-light);">
                    <div id="profile-avatar-placeholder" style="
                        width: 200px; height: 200px;
                        background: linear-gradient(135deg, var(--violet-mid), var(--violet-deep));
                        display: flex; align-items: center; justify-content: center;
                        font-size: 72px;
                    ">🐾</div>
                    <img id="profile-avatar-img" src="" alt="" style="
                        position: absolute; top: 0; left: 0;
                        width: 200px; height: 200px;
                        object-fit: cover;
                        display: none;
                    ">
                </div>
                <h2 id="profile-name" style="color:var(--violet-pale);"></h2>
                <p id="profile-profession" style="color:var(--text-muted); font-size:13px;"></p>
                <p id="profile-aforism" style="color:var(--violet-pale); font-size:13px; font-style:italic; margin-top:4px;"></p>
            </div>
            <div class="card">
                <h3 class="card-title">О члене стаи</h3>
                <div id="stats"></div>
            </div>
            <div class="card" id="backstory-card">
                <h3 class="card-title" style="cursor:pointer; user-select:none;" onclick="toggleBackstory()">
                    <span id="backstory-arrow" style="font-size:12px; margin-right:6px;">▶</span>
                    Предыстория
                </h3>
                <div id="backstory-content" style="display:none;">
                    <p id="profile-backstory-text" style="font-size:14px; line-height:1.6; white-space:pre-wrap;"></p>
                </div>
            </div>
            <div class="card" id="biography-card">
                <h3 class="card-title" style="cursor:pointer; user-select:none;" onclick="toggleBiography()">
                    <span id="biography-arrow" style="font-size:12px; margin-right:6px;">▶</span>
                    Биография
                </h3>
                <div id="biography-content" style="display:none;">
                    <p id="profile-biography-text" style="font-size:14px; line-height:1.6; white-space:pre-wrap;"></p>
                </div>
            </div>
        </div>

        <div>
            <div class="card">
                <h3 class="card-title">📜 Мои объявления</h3>
                <div id="user-posts"></div>
            </div>
            <div class="card">
                <h3 class="card-title">🎨 Мои асеты</h3>
                <div id="user-assets"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>FangUnion © 2026 | Союз Клыков — пространство для фурри</p>
    </footer>

    <script>
        const API = "http://127.0.0.1:8000/api";
        const userId = localStorage.getItem("user_id");

        if (!userId) {
            window.location.href = "login.html";
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            return new Date(dateStr).toLocaleDateString("ru-RU", {
                day: "numeric", month: "long", year: "numeric",
                hour: "2-digit", minute: "2-digit",
            });
        }

        async function loadProfile() {
            try {
                // Сначала обновляем статус онлайн
                await fetch(`${API}/users/${userId}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ is_online: 1, last_visit: new Date().toISOString() }),
                });
                // Затем загружаем данные
                const res = await fetch(`${API}/users/${userId}`);
                const user = await res.json();
                document.getElementById("profile-name").textContent = user.display_name || user.email;
                document.getElementById("profile-profession").textContent = user.profession ? `Профессия: ${user.profession}` : "";
                document.getElementById("profile-aforism").textContent = user.aforism ? `«${user.aforism}»` : "";
                document.getElementById("profile-backstory-text").textContent = user.backstory || "Пока ничего не написано.";
                document.getElementById("profile-biography-text").textContent = user.biography || "Пока ничего не написано.";

                if (user.avatar_url) {
                    document.getElementById("profile-avatar-img").src = user.avatar_url;
                    document.getElementById("profile-avatar-img").style.display = 'block';
                    document.getElementById("profile-avatar-placeholder").style.display = 'none';
                }
                const isCurrentUser = true;
                const onlineStatus = isCurrentUser || user.is_online;
                let onlineText = onlineStatus ? 'Онлайн' : 'Оффлайн';
                if (!onlineStatus && user.last_visit) {
                    const diff = Date.now() - new Date(user.last_visit).getTime();
                    const hours = Math.floor(diff / 3600000);
                    const days = Math.floor(hours / 24);
                    if (days > 0) {
                        onlineText += ` (был ${days} дн. назад)`;
                    } else if (hours > 0) {
                        onlineText += ` (был ${hours} ч. назад)`;
                    } else {
                        onlineText += ' (был недавно)';
                    }
                }
                document.getElementById("stats").innerHTML = `
                    <p><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${onlineStatus ? '#6aaf7e' : '#666'};margin-right:6px;"></span>${onlineText}</p>
                    <p style="margin-top:4px;">Звание: <strong>${user.rank || 'Новичок'}</strong></p>
                    <p style="margin-top:4px;">Баланс: <strong>${user.balance || 0} 🦷</strong></p>
                    <p style="margin-top:4px;">Постов: <strong>${user.post_count || 0}</strong></p>
                    <p style="margin-top:4px;">В стае с: <strong>${new Date(user.created_at).toLocaleDateString("ru-RU")}</strong></p>
                `;
            } catch (e) {
                console.error(e);
            }
        }

        async function loadUserPosts() {
            try {
                const res = await fetch(`${API}/posts/`);
                const posts = await res.json();
                const myPosts = posts.filter(p => p.author_id === parseInt(userId));
                const container = document.getElementById("user-posts");
                if (myPosts.length === 0) {
                    container.innerHTML = "<p style='color:var(--text-muted);'>Пока пусто.</p>";
                    return;
                }
                container.innerHTML = myPosts.map(p => `
                    <div style="padding:10px 0; border-bottom:1px solid var(--border-color);">
                        <div>${escapeHtml(p.content)}</div>
                        <div style="font-size:11px; color:var(--text-muted); margin-top:4px;">${formatDate(p.created_at)}</div>
                    </div>
                `).join("");
                // Обновляем счётчик постов
                await fetch(`${API}/users/${userId}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ post_count: myPosts.length }),
                });
            } catch (e) {
                console.error(e);
            }
        }

        async function loadUserAssets() {
            try {
                const res = await fetch(`${API}/assets/`);
                const assets = await res.json();
                const myAssets = assets.filter(a => a.owner_id === parseInt(userId));
                const container = document.getElementById("user-assets");
                if (myAssets.length === 0) {
                    container.innerHTML = "<p style='color:var(--text-muted);'>Пока пусто.</p>";
                    return;
                }
                container.innerHTML = myAssets.map(a => `
                    <div style="padding:10px 0; border-bottom:1px solid var(--border-color);">
                        <strong>${escapeHtml(a.title)}</strong>
                        <span class="species-tag" style="margin-left:6px;">${a.asset_type || 'прочее'}</span>
                    </div>
                `).join("");
            } catch (e) {
                console.error(e);
            }
        }

        function logout() {
            localStorage.removeItem("user_id");
            window.location.href = "login.html";
        }

        function toggleBackstory() {
            const content = document.getElementById("backstory-content");
            const arrow = document.getElementById("backstory-arrow");
            if (content.style.display === "none") {
                content.style.display = "block";
                arrow.textContent = "▼";
            } else {
                content.style.display = "none";
                arrow.textContent = "▶";
            }
        }

        function toggleBiography() {
            const content = document.getElementById("biography-content");
            const arrow = document.getElementById("biography-arrow");
            if (content.style.display === "none") {
                content.style.display = "block";
                arrow.textContent = "▼";
            } else {
                content.style.display = "none";
                arrow.textContent = "▶";
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadProfile();
            loadUserPosts();
            loadUserAssets();
        });
    </script>
</body>
</html>
