<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Войти — FangUnion</title>
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="logo" onclick="location.href='index.html'">
                <img src="img/logo.svg" alt="FangUnion" style="height:36px;">
            </div>
            <nav class="nav">
                <a href="index.html" class="nav-link">Лента</a>
                <a href="arrival.html" class="nav-link">Въезд</a>
                <a href="login.html" class="nav-link active">Войти</a>
            </nav>
        </div>
    </header>

    <main class="main" style="max-width: 480px; grid-template-columns: 1fr; display:flex; justify-content:center;">
        <div class="card" style="width: 400px; margin-top: 40px;">
            <h2 class="card-title" style="text-align:center;">🐾 Войти в стаю</h2>

            <div id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Номер паспорта</label>
                    <input type="text" id="login-passport" placeholder="FK-XXXXXX" style="text-transform:uppercase;">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="login-password">
                </div>
                <button class="btn btn-gold" style="width:100%" onclick="login()">Войти</button>
                <p style="text-align:center; margin-top:14px; font-size:13px; color:var(--text-muted);">
                    Ещё не в стае? <a href="arrival.html">Вступить</a>
                </p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>FangUnion © 2026 | Союз Клыков — пространство для фурри</p>
    </footer>

    <script>
        const API = "http://127.0.0.1:8000/api";

        async function login() {
            const data = {
                email: document.getElementById("login-email").value.trim(),
                passport_number: document.getElementById("login-passport").value.trim().toUpperCase(),
                password: document.getElementById("login-password").value,
            };
            if (!data.email || !data.passport_number || !data.password) {
                alert("Заполни email, номер паспорта и пароль!");
                return;
            }
            try {
                const res = await fetch(`${API}/users/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data),
                });
                if (res.ok) {
                    const result = await res.json();
                    localStorage.setItem("user_id", result.user_id);
                    window.location.href = "profile.html";
                } else {
                    const err = await res.json();
                    alert(err.detail || "Неверный email, номер паспорта или пароль!");
                }
            } catch (e) {
                alert("Ошибка связи с сервером");
            }
        }
    </script>
</body>
</html>
